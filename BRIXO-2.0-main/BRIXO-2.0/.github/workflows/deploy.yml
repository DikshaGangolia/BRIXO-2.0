name: Deploy BRIXO to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./BRIXO-2.0-main
        run: npm install

      - name: Build project
        working-directory: ./BRIXO-2.0-main
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./BRIXO-2.0-main/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        # trigger github pages deployment